<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wazero | Yamato Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: radial-gradient(circle at center, #0a0a0a 0%, #000 70%);
    font-family: 'Orbitron', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
}

/* Neon grid background */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(rgba(0,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: rotateX(60deg) translateY(200px);
    animation: gridMove 10s linear infinite;
}

@keyframes gridMove {
    from { transform: rotateX(60deg) translateY(200px); }
    to { transform: rotateX(60deg) translateY(-200px); }
}

.container {
    position: relative;
    text-align: center;
    padding: 60px 80px;
    border-radius: 20px;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,255,255,0.2),
                inset 0 0 20px rgba(0,255,255,0.1);
    border: 1px solid rgba(0,255,255,0.3);
}

h1 {
    font-size: 4rem;
    letter-spacing: 10px;
    margin-bottom: 20px;
    color: #0ff;
    text-shadow: 0 0 10px #0ff,
                 0 0 20px #0ff,
                 0 0 40px #00f0ff;
}

.subtitle {
    color: #aaa;
    margin-bottom: 10px;
    font-size: 1rem;
}

.highlight {
    color: #ff00ff;
    text-shadow: 0 0 8px #ff00ff;
}

.footer {
    margin-top: 25px;
    font-size: 0.85rem;
    color: #666;
}

/* Glow button */
.button {
    margin-top: 30px;
    padding: 12px 28px;
    border: 1px solid #0ff;
    border-radius: 30px;
    color: #0ff;
    background: transparent;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: 0.3s;
}

.button:hover {
    background: #0ff;
    color: #000;
    box-shadow: 0 0 15px #0ff, 0 0 30px #0ff;
}

/* Floating glow orbs */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
}

.orb1 { width: 200px; height: 200px; background: #0ff; top: 10%; left: 15%; }
.orb2 { width: 150px; height: 150px; background: #f0f; bottom: 15%; right: 20%; }

</style>
</head>

<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
    <h1>WAZERO</h1>
    <p class="subtitle">Powered by <span class="highlight">Yamato WhatsApp Bot v3.0</span></p>
    <p class="subtitle">Node.js • Groq AI Integration</p>

    <button class="button">Initialize System</button>

    <div class="footer">© 2026 Wazero Systems</div>
</div>

</body>
</html>
