<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wazero | Yamato Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #ff008c, #ff4dc4);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: url('https://cur.cursors-4u.net/games/gam-16/gam1536.cur'), auto;
}

.wrapper {
    width: 90%;
    max-width: 1100px;
    background: #ffd400;
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
}

/* grid background */
.wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: linear-gradient(#00000022 1px, transparent 1px),
                      linear-gradient(90deg, #00000022 1px, transparent 1px);
    background-size: 40px 40px;
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 2;
}

.logo {
    font-weight: 800;
    font-size: 20px;
    background: #00c2ff;
    padding: 10px 14px;
    border-radius: 10px;
}

.menu {
    display: flex;
    gap: 25px;
    font-weight: 600;
}

.search {
    background: #fff;
    padding: 8px 12px;
    border-radius: 10px;
}

.hero {
    text-align: center;
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 70px;
    font-weight: 800;
    color: #4b0082;
    line-height: 1.1;
}

.hero span {
    background: #7ed957;
    padding: 5px 20px;
    border-radius: 15px;
}

.sub {
    margin-top: 10px;
    color: #333;
}

.button {
    margin-top: 25px;
    display: inline-block;
    background: #ff008c;
    color: #fff;
    padding: 12px 25px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
}

/* cards section */
.section {
    margin-top: 50px;
    background: #6a00ff;
    padding: 25px;
    border-radius: 20px;
    color: #fff;
}

.section h2 {
    background: #ffd400;
    color: #000;
    display: inline-block;
    padding: 8px 15px;
    border-radius: 10px;
    font-size: 16px;
}

.cards {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
}

.card {
    background: #fff;
    border-radius: 15px;
    height: 120px;
}

</style>
</head>

<body>
<div class="wrapper">

    <div class="nav">
        <div class="logo">🎮</div>
        <div class="menu">
            <div>All games</div>
            <div>Racing</div>
            <div>Action</div>
            <div>Sports</div>
        </div>
        <div class="search">Search 🔍</div>
    </div>

    <div class="hero">
        <h1>Let The <span>Game</span><br>Begin</h1>
        <p class="sub">Powered by Yamato WhatsApp Bot v3.0</p>
        <div class="button">Start Now</div>
    </div>

    <div class="section">
        <h2>Most popular</h2>
        <div class="cards">
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>
        </div>
    </div>

</div>
</body>
</html>
